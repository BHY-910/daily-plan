name: 每日自动创建日记

on:
  schedule:
    # 每天北京时间早上6点触发（UTC时间22点）
    - cron: '22 22 * * *'
  workflow_dispatch:  # 允许你手动触发

jobs:
  create-daily-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: 创建今日日记 Issue
        uses: imjohnbo/issue-bot@v3
        with:
          title: "[日记] ${{ dateFormat('YYYY-MM-DD') }}"
          labels: "日记,每日计划"
          template: daily-plan.yml
          token: ${{ secrets.GITHUB_TOKEN }}
